# Intro on main page, content is markdown
homeIntroTitle = 'Software Engineer III for distributed fintech systems.'
homeIntroSubtitle = 'Software Engineer III'
currentCompanyName = 'Satispay'
currentCompanyUrl = 'https://www.satispay.com/it-it/'
homeIntroContent = """
I am Edoardo Fratus, a Software Engineer III in Milan working on high-scale fintech systems at Satispay. I like the part of engineering where product pressure, reliability, and clean system design all meet: payments, reconciliation, fan-out processing, circuit breakers, and the boring-but-critical details that keep platforms calm under load.

Recently I have been leading end-to-end delivery for major Welfare and Flexben features, coordinating Product, frontend, mobile, and backend work while staying hands-on in backend technical analysis and implementation. I also use AI in a concrete way: building agents and local workflows that remove repetitive engineering work without removing engineering judgement.
"""

